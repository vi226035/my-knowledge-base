site_name: 我的知识库
site_description: 信号处理、FPGA 与机器学习学习笔记
site_author: 你自己
site_url: https://vi226035.github.io/my-knowledge-base/

strict: false

repo_name: vi226035/my-knowledge-base
repo_url: https://github.com/vi226035/my-knowledge-base

theme:
  name: material
  language: zh
  font: false
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 切换浅色模式
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
  favicon: ''

extra:
  generator: false

exclude_docs: |
  kb_material/**/*.md
  kb_material/**/*.json
  kb_material/**/*_model.json
  kb_material/**/*_content_list.json
  kb_material/**/block_list.json
  kb_material/**/content_list_v2.json
  kb_material/**/layout.json

hooks:
  - hooks.py

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details
  - toc:
      permalink: true

extra_javascript:
  - javascripts/katex.min.js
  - javascripts/katex.js

extra_css:
  - stylesheets/katex.min.css
  - stylesheets/extra.css

nav:
  - 首页: index.md
  - 机器学习:
      - 神经网络: ML/神经网络.md
      - 卷积神经网络（CNN）: ML/卷积神经网络（CNN）.md
      - 循环神经网络（RNN）: ML/循环神经网络（RNN）.md
      - 长短期记忆网络（LSTM）: ML/长短期记忆网络（LSTM）.md
      - 常见疑惑解答: ML/一些疑惑解答.md
      - 应用场景与选型: ML/神经网络应用场景与选型.md
      - 梯度下降优化算法: ML/梯度下降优化算法.md
      - 时域卷积网络（TCN）: ML/时域卷积网络（TCN）.md
  - 信号处理:
      - DDC（数字下变频）: 信号处理/DDC.md
      - DUC（数字上变频）: 信号处理/DUC.md
      - 雷达数字信号中频接收: 信号处理/雷达数字信号中频接收.md
      - 雷达信号检测: 信号处理/雷达信号检测.md
      - 雷达信号调制类型识别: 信号处理/雷达信号调制类型识别.md
  - 矩阵分解:
      - 并行双边Jacobi旋转特征值分解: 矩阵分解/并行双边Jacobi旋转特征值分解.md
  - FPGA:
      - FPGA: FPGA/index.md
